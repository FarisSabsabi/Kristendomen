<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristendom Quiz Portal</title>
    <style>
        /* Variabler för enkel hantering av färger (Dark/Light mode) */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --primary-blue: #1a73e8;
            --border-color: #e8f0fe;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        .dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --primary-blue: #8ab4f8;
            --border-color: #444;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s ease;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        h1 { color: var(--primary-blue); margin-bottom: 10px; }

        /* Kontroller (Sök & Darkmode) */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        #quizSearch {
            flex-grow: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
        }

        .toggle-btn {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            background: var(--primary-blue);
            color: white;
        }

        /* Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, opacity 0.3s;
        }

        .game-card:hover { transform: translateY(-5px); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .game-card h2 { font-size: 1.1rem; margin: 0; }

        /* Checkbox Styling */
        .done-label {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            background: #eef5ff;
            padding: 5px 10px;
            border-radius: 15px;
            color: #000;
        }

        .game-container {
            position: relative;
            width: 100%;
            padding-top: 75%;
            background: #eee;
            border-radius: 8px;
        }

        .game-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none; border-radius: 8px;
        }

        /* Chatt-sektion */
        .chat-card { grid-column: 1 / -1; }
        #chat-box {
            height: 200px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }

        .admin-login { font-size: 0.7rem; color: #888; margin-top: 10px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Kristendom Quiz Portal</h1>
        <div class="controls">
            <input type="text" id="quizSearch" placeholder="Sök efter ett quiz..." onkeyup="filterQuizzes()">
            <button class="toggle-btn" onclick="toggleDarkMode()">🌓 Mode</button>
        </div>
    </header>

    <div class="game-grid" id="mainGrid">

        <!-- QUIZ 1 -->
        <div class="game-card quiz-item">
            <div class="card-header">
                <h2>Quiz 1: Grunderna</h2>
                <label class="done-label"><input type="checkbox" onclick="markDone(this)"> Klar ✅</label>
            </div>
            <div class="game-container">
               <iframe src="https://wordwall.net" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- QUIZ 2 -->
        <div class="game-card quiz-item">
            <div class="card-header">
                <h2>Quiz 2: Bibeln</h2>
                <label class="done-label"><input type="checkbox" onclick="markDone(this)"> Klar ✅</label>
            </div>
            <div class="game-container">
              <iframe src="https://wordwall.net" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- QUIZ 3 -->
        <div class="game-card quiz-item">
            <div class="card-header">
                <h2>Quiz 3: Högtider</h2>
                <label class="done-label"><input type="checkbox" onclick="markDone(this)"> Klar ✅</label>
            </div>
            <div class="game-container">
             <iframe src="https://wordwall.net" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- QUIZ 4 -->
        <div class="game-card quiz-item">
            <div class="card-header">
                <h2>Quiz 4: Blandat</h2>
                <label class="done-label"><input type="checkbox" onclick="markDone(this)"> Klar ✅</label>
            </div>
            <div class="game-container">
            <iframe src="https://wordwall.net" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <!-- CHATT -->
        <div class="game-card chat-card">
            <div class="card-header"><h2>💬 Klasschatt</h2></div>
            <div id="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="user-name" placeholder="Namn" style="width: 100px;">
                <input type="text" id="chat-input" placeholder="Skriv ett meddelande..." style="flex-grow: 1;">
                <button onclick="sendMessage()" class="toggle-btn">Skicka</button>
            </div>
            <button class="admin-login" onclick="loginAdmin()">Admin Access</button>
        </div>

    </div>

<script>
    // --- FUNKTIONER ---

    // 1. Dark Mode
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    // 2. Sökfunktion (Debuggad för att ignorera chatten)
    function filterQuizzes() {
        let input = document.getElementById('quizSearch').value.toLowerCase();
        let items = document.getElementsByClassName('quiz-item');
        
        for (let item of items) {
            let title = item.querySelector('h2').innerText.toLowerCase();
            item.style.display = title.includes(input) ? "" : "none";
        }
    }

    // 3. Markera som klar (Visuell feedback)
    function markDone(cb) {
        const card = cb.closest('.game-card');
        card.style.opacity = cb.checked ? "0.5" : "1";
        card.style.filter = cb.checked ? "grayscale(80%)" : "none";
    }

    // 4. Chatt-logik (Local Storage)
    const ADMIN_CODE = "1234"; 
    let isAdmin = false;

    function loginAdmin() {
        if(prompt("Admin-kod:") === ADMIN_CODE) {
            isAdmin = true;
            alert("Inloggad! Du kan nu radera meddelanden.");
            renderMessages();
        }
    }

    function sendMessage() {
        const name = document.getElementById('user-name').value || "Anonym";
        const text = document.getElementById('chat-input').value;
        if (!text.trim()) return;

        const msgs = JSON.parse(localStorage.getItem('classChat') || '[]');
        msgs.push({ name, text, id: Date.now() });
        localStorage.setItem('classChat', JSON.stringify(msgs));
        document.getElementById('chat-input').value = "";
        renderMessages();
    }

    function deleteMsg(id) {
        let msgs = JSON.parse(localStorage.getItem('classChat') || '[]');
        msgs = msgs.filter(m => m.id !== id);
        localStorage.setItem('classChat', JSON.stringify(msgs));
        renderMessages();
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        const msgs = JSON.parse(localStorage.getItem('classChat') || '[]');
        box.innerHTML = msgs.map(m => `
            <div style="margin-bottom:8px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span><strong>${m.name}:</strong> ${m.text}</span>
                ${isAdmin ? `<button onclick="deleteMsg(${m.id})" style="color:red; border:none; background:none; cursor:pointer;">X</button>` : ''}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    // Starta chatten
    renderMessages();
</script>

</body>
</html>
